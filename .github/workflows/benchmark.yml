name: Benchmark

on:
  push:
    branches:
      - ci/**
  workflow_dispatch:
    inputs:
      comment:
        description: Optional note to store in metrics.csv and mark in charts
        required: false
        type: string

jobs:
  benchmark:
    runs-on: [self-hosted, macOS, ARM64, defold]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Verify Java tools
        run: |
          java -version
          which java
          which jcmd
          jcmd -l || true

      - name: Show runner details
        run: uname -a

      - name: Compute dependency cache key
        id: dependency-cache
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/dependency_cache.py key --project defold/big-synthetic-project

      - name: Restore dependency cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: work/dependency-cache
          key: ${{ runner.os }}-${{ runner.arch }}-defold-deps-${{ steps.dependency-cache.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-defold-deps-

      - name: Run benchmark bootstrap
        env:
          BENCHMARK_PREFER_PATH_JCMD: '1'
          GITHUB_TOKEN: ${{ github.token }}
          PYTHONUNBUFFERED: '1'
          COMMENT: ${{ inputs.comment || '' }}
        run: |
          mkdir -p artifacts work data charts
          python scripts/run_benchmark.py \
            --work-dir work \
            --artifacts-dir artifacts \
            --metadata-out artifacts/run-metadata.json \
            --project defold/big-synthetic-project
          python scripts/persist_metrics.py \
            --sample artifacts/sample.json \
            --build-metadata artifacts/defold-build.json \
            --csv data/metrics.csv \
            ${COMMENT:+--comment "$COMMENT"}
          python scripts/generate_charts.py \
            --metrics-csv data/metrics.csv \
            --charts-dir charts

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: benchmark-artifacts
          path: |
            artifacts
            data/metrics.csv
            charts
            README.md
          if-no-files-found: warn
