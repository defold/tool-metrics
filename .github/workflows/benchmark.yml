name: Benchmark

on:
  push:
    branches:
      - ci/**
  workflow_dispatch:
    inputs:
      comment:
        description: Optional note to store in metrics.csv and mark in charts
        required: false
        type: string

jobs:
  benchmark:
    runs-on: [self-hosted, macOS, ARM64, defold]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Show runner details
        run: uname -a

      - name: Run benchmark bootstrap
        env:
          BENCHMARK_PREFER_PATH_JCMD: '1'
          GITHUB_TOKEN: ${{ github.token }}
          PYTHONUNBUFFERED: '1'
          COMMENT: ${{ inputs.comment || '' }}
        run: |
          mkdir -p artifacts work data charts
          python scripts/run_benchmark.py \
            --work-dir work \
            --artifacts-dir artifacts \
            --metadata-out artifacts/run-metadata.json \
            --project defold/big-synthetic-project
          python scripts/persist_metrics.py \
            --sample artifacts/sample.json \
            --build-metadata artifacts/defold-build.json \
            --csv data/metrics.csv \
            ${COMMENT:+--comment "$COMMENT"}
          python scripts/generate_charts.py \
            --metrics-csv data/metrics.csv \
            --charts-dir charts

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: |
            artifacts
            data/metrics.csv
            charts
            README.md
          if-no-files-found: warn
